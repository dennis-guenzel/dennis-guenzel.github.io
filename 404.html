<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Page not found — Dennis Günzel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;1,300;1,400&family=Manrope:wght@400;600&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' fill='%230E1B2C'/%3E%3Ctext x='32' y='44' font-family='Georgia,serif' font-size='32' font-weight='500' fill='%23F4F1EB' text-anchor='middle'%3EDG%3C/text%3E%3C/svg%3E">
<style>
  :root {
    --paper: #F4F1EB;
    --ink: #0E1B2C;
    --slate: #3C4862;
    --muted: #6B7589;
    --brass: #A8895F;
    --hair: #C9C2B0;
  }
  *, *::before, *::after { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: "Manrope", -apple-system, system-ui, sans-serif;
    color: var(--ink);
    background: var(--paper);
    display: flex;
    flex-direction: column;
    background-image:
      radial-gradient(ellipse 80% 60% at 50% 0%, rgba(255,255,255,.6), transparent 60%),
      radial-gradient(ellipse 60% 50% at 100% 100%, rgba(14,27,44,.04), transparent 60%);
  }
  main {
    flex: 1;
    display: grid;
    place-items: center;
    padding: 64px 24px;
  }
  .box { max-width: 560px; text-align: center; }
  .num {
    font-family: "Cormorant Garamond", Georgia, serif;
    font-weight: 400;
    font-style: italic;
    font-size: clamp(96px, 18vw, 200px);
    line-height: 1;
    color: var(--ink);
    margin: 0;
    letter-spacing: -0.02em;
  }
  .kicker {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.22em;
    color: var(--brass);
    margin: 24px 0 12px;
  }
  h1 {
    font-family: "Cormorant Garamond", Georgia, serif;
    font-weight: 400;
    font-size: clamp(28px, 4vw, 40px);
    margin: 0 0 16px;
    color: var(--ink);
  }
  p {
    font-size: 16px;
    color: var(--slate);
    line-height: 1.6;
    margin: 0 0 32px;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 13px 22px;
    background: var(--ink);
    color: var(--paper);
    border: 1px solid var(--ink);
    border-radius: 999px;
    text-decoration: none;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.10em;
    text-transform: uppercase;
    transition: transform .25s, background .25s;
  }
  .btn:hover { transform: translateY(-1px); background: #1F2C42; }
  footer {
    text-align: center;
    padding: 24px;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    border-top: 1px solid var(--hair);
  }
</style>
</head>
<body>
<main>
  <div class="box">
    <p class="num">404</p>
    <p class="kicker">Non est inventum</p>
    <h1>This page could not be found.</h1>
    <p>The link may be outdated, mistyped, or pointing to something that's no longer here. Let's return to the front page.</p>
    <a class="btn" href="/">← Back to home</a>
  </div>
</main>
<footer>Dennis Günzel · LL.M.</footer>
</body>
</html>
